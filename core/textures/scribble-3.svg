<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 60" width="140" height="60">
  <!-- Scrawled "note" — wavy lines like hurried handwriting -->
  <defs>
    <filter id="hw-blur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.35"/>
    </filter>
  </defs>
  <g filter="url(#hw-blur)" fill="none" stroke="#2a2a2a" stroke-linecap="round">
    <!-- Line 1 -->
    <path d="M10,15 C20,12 30,17 40,14 C50,11 60,16 70,13 C80,10 90,15 100,12 C108,10 115,14 125,12"
          stroke-width="1.4" stroke-opacity="0.12"/>
    <!-- Line 2 — shorter -->
    <path d="M10,28 C22,25 34,30 46,27 C58,24 70,29 82,26 C90,24 98,28 105,25"
          stroke-width="1.3" stroke-opacity="0.1"/>
    <!-- Line 3 -->
    <path d="M10,41 C25,38 40,43 55,40 C70,37 85,42 100,39 C110,37 120,41 130,38"
          stroke-width="1.4" stroke-opacity="0.11"/>
    <!-- Line 4 — shortest, trailing off -->
    <path d="M10,54 C20,51 30,56 40,53 C50,50 58,55 65,52"
          stroke-width="1.2" stroke-opacity="0.08"/>
  </g>
</svg>
