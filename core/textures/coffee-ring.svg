<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Inner shadow: contour-following via inverted alpha blur.
         Light tan base fill + dark sepia shadow at edges = visible contrast.
         Stacked: tight rim (fast falloff) + broader pooling pass. -->
    <filter id="coffee-pool" x="-10%" y="-10%" width="120%" height="120%">
      <!-- Inverted alpha: opaque outside shape, transparent inside -->
      <feComponentTransfer in="SourceAlpha" result="inv">
        <feFuncA type="table" tableValues="1 0"/>
      </feComponentTransfer>
      <!-- Pass 1: tight dark rim -->
      <feGaussianBlur in="inv" stdDeviation="25" result="blur1"/>
      <feFlood flood-color="#3A2010" flood-opacity="0.9" result="c1"/>
      <feComposite in="c1" in2="blur1" operator="in" result="s1"/>
      <feComposite in="s1" in2="SourceAlpha" operator="in" result="clip1"/>
      <!-- Pass 2: broader mid-ring pooling -->
      <feGaussianBlur in="inv" stdDeviation="55" result="blur2"/>
      <feFlood flood-color="#4A3020" flood-opacity="0.6" result="c2"/>
      <feComposite in="c2" in2="blur2" operator="in" result="s2"/>
      <feComposite in="s2" in2="SourceAlpha" operator="in" result="clip2"/>
      <!-- Stack: base fill → broad pool → tight rim -->
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="clip2"/>
        <feMergeNode in="clip1"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Light tan base — the shadow needs contrast against this to be visible.
       Dark fill (#5C3A1E) + dark shadow = no contrast. Light fill + dark shadow = visible. -->
