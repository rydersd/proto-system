<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Coffee ring stain — single ring with uneven opacity -->
  <defs>
    <filter id="blur1" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
    <radialGradient id="ringFade1" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#5C3A1E" stop-opacity="0"/>
      <stop offset="78%" stop-color="#5C3A1E" stop-opacity="0.18"/>
      <stop offset="84%" stop-color="#5C3A1E" stop-opacity="0.25"/>
      <stop offset="88%" stop-color="#5C3A1E" stop-opacity="0.15"/>
      <stop offset="92%" stop-color="#5C3A1E" stop-opacity="0.22"/>
      <stop offset="96%" stop-color="#5C3A1E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5C3A1E" stop-opacity="0"/>
    </radialGradient>
    <!-- Inner fill — very faint -->
    <radialGradient id="innerFill1" cx="45%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#6B4226" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#6B4226" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#6B4226" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Main ring -->
  <ellipse cx="100" cy="100" rx="82" ry="78" fill="url(#ringFade1)" filter="url(#blur1)"/>
  <!-- Inner residue -->
  <ellipse cx="96" cy="98" rx="60" ry="56" fill="url(#innerFill1)"/>
  <!-- Thicker drip on one side -->
  <ellipse cx="100" cy="100" rx="84" ry="80" fill="none" stroke="#5C3A1E" stroke-width="4" stroke-opacity="0.08" filter="url(#blur1)"
    stroke-dasharray="20 40 60 30 10 50" stroke-dashoffset="15"/>
</svg>
