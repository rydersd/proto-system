<!DOCTYPE html>
<html lang="en" class="wireframe">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM — Project Name</title>
  <link rel="stylesheet" href="core/proto-core.css">
  <link rel="stylesheet" href="surfaces/slack.css">
  <link rel="stylesheet" href="project.css">
</head>
<body>

<div class="slack-app">

<div class="slack-rail">
  <div class="slack-rail-workspace">W</div>
  <button class="slack-rail-btn"><span class="slack-rail-icon">⌂</span>Home</button>
  <button class="slack-rail-btn active"><span class="slack-rail-icon">✉</span>DMs</button>
  <button class="slack-rail-btn"><span class="slack-rail-icon">⚡</span>Activity</button>
  <button class="slack-rail-btn"><span class="slack-rail-icon">⋯</span>More</button>
</div>

<div class="slack-sidebar">
  <div class="slack-workspace-header">
    <span class="workspace-name">Workspace Name</span>
    <span class="workspace-menu">▾</span>
  </div>
  <div class="slack-nav-section">
    <div class="slack-nav-section-title">Direct Messages</div>
    <a href="#" class="slack-nav-item slack-nav-item-active">
      <span class="slack-nav-avatar" style="background:var(--wf-muted);color:var(--wf-white)">B</span> Bot Name
    </a>
    <a href="#" class="slack-nav-item">
      <span class="slack-nav-avatar" style="background:var(--wf-accent);color:var(--wf-white)">U</span> Other User
    </a>
  </div>
</div>

<div class="slack-main">
  <div class="slack-channel-header">
    <div class="flex items-center gap-8">
      <span class="slack-channel-name">Bot Name</span>
      <span class="slack-message-badge">APP</span>
    </div>
  </div>

  <div class="slack-messages">

    <div class="slack-message">
      <div class="slack-message-header">
        <span class="slack-message-avatar slack-message-avatar--bot" style="background:var(--wf-muted);color:var(--wf-white)">B</span>
        <span class="slack-message-sender">Bot Name <span class="slack-message-badge">APP</span></span>
        <span class="slack-message-time">just now</span>
      </div>
      <div class="slack-message-content">
        <div class="slack-message-text">Replace with DM content.</div>
      </div>
    </div>

  </div>

  <div class="slack-composer">
    <textarea class="slack-composer-input" placeholder="Message Bot Name" aria-label="Message input"></textarea>
  </div>
</div>

</div>

<div class="wf-design-notes">
  <div class="wf-spec-panel">
    <div class="wf-spec-header">DM — Bot Name</div>
    <div class="wf-spec-section">
      <div class="wf-spec-section-title">Summary</div>
      <div class="wf-spec-body">What this DM page shows.</div>
    </div>
  </div>
</div>

<script src="project-data.js"></script>
<script src="core/proto-nav.js"></script>

</body>
</html>
