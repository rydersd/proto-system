<!DOCTYPE html>
<html lang="en" class="wireframe">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Title — Project Name</title>
  <link rel="stylesheet" href="core/proto-core.css">
  <!-- Pick ONE surface: surfaces/slack.css | surfaces/salesforce.css | surfaces/internal-ds.css -->
  <link rel="stylesheet" href="surfaces/internal-ds.css">
  <link rel="stylesheet" href="project.css">
</head>
<body>

<main style="max-width:1200px;margin:0 auto;padding:24px;">

  <h1 style="font-size:20px;font-weight:700;color:var(--wf-ink);margin-bottom:16px;">Page Title</h1>

  <div class="wf-card">
    <div class="wf-card-header">Section Title</div>
    <div class="wf-card-body">
      <p style="color:var(--wf-text);">Replace this with your page content.</p>
    </div>
  </div>

</main>

<div class="wf-design-notes">
  <div class="wf-spec-panel">
    <div class="wf-spec-header">Page Title</div>
    <div class="wf-spec-section">
      <div class="wf-spec-section-title">Summary</div>
      <div class="wf-spec-body">What this page shows and why it exists.</div>
    </div>
    <div class="wf-spec-section">
      <div class="wf-spec-section-title">JTBD</div>
      <div class="wf-spec-body">What job the user is trying to accomplish on this page.</div>
    </div>
    <div class="wf-spec-section">
      <div class="wf-spec-section-title">Design Spec</div>
      <div class="wf-spec-body">Layout, components, and interactions.</div>
    </div>
  </div>
</div>

<script src="project-data.js"></script>
<script src="core/proto-nav.js"></script>
<!-- Diagnostics: uncomment during development -->
<!-- <script src="core/proto-doctor.js"></script> -->

</body>
</html>
